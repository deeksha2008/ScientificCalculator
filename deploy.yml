---
- name: Deploy Scientific Calculator Container
  hosts: localhost
  connection: local
  tasks:
    - name: Pull Docker Image
      docker_image:
        name: "deeksha2008/scientific-calculator:latest"
        source: pull
      register: docker_pull_result

    - name: Display Docker Pull Result
      debug:
        var: docker_pull_result

    - name: Stop old container
      shell: docker stop scientific-calc-app || true
      
    - name: Remove old container
      shell: docker rm scientific-calc-app || true
     
    - name: Running container
      shell: docker run -d --name scientific-calc-app -p 8081:8080 deeksha2008/scientific-calculator:latest
